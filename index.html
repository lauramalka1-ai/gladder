
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Gladder"/>
<meta name="theme-color" content="#f5e6f0"/>
<title>Gladder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Serif+Display:ital@0;1&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg: #faf7f5;
  --card: #ffffff;
  --accent: #c084a8;
  --accent2: #7bb89a;
  --accent3: #e8a87c;
  --text: #1a1410;
  --text2: #6b5c52;
  --text3: #a89890;
  --border: #ece5e0;
  --green: #7bb89a;
  --red: #d97070;
  --purple: #9b72b8;
  --radius: 18px;
  --font: 'DM Sans', system-ui, sans-serif;
  --font-display: 'DM Serif Display', Georgia, serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--font);color:var(--text);font-size:15px;}

/* APP SHELL */
.app{
  max-width:430px;
  margin:0 auto;
  height:100dvh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  position:relative;
  overflow:hidden;
}

/* SCROLL CONTAINER */
.scroll-area{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-top:calc(var(--safe-top));
  padding-bottom:calc(70px + var(--safe-bottom));
}
.scroll-area::-webkit-scrollbar{display:none;}

/* PAGES */
.page{display:none;}
.page.active{display:block;}

/* ── JOURNAL ── */
.journal-header{
  padding:20px 18px 0;
}
.week-nav{display:flex;align-items:center;gap:6px;}
.week-arrow{
  background:var(--card);
  border:none;
  width:36px;height:36px;
  border-radius:12px;
  font-size:16px;color:var(--text2);
  cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.week-scroll{
  display:flex;gap:4px;overflow-x:auto;flex:1;
  scrollbar-width:none;padding:2px 0;
}
.week-scroll::-webkit-scrollbar{display:none;}
.day-pill{
  display:flex;flex-direction:column;align-items:center;
  padding:6px 10px;border-radius:12px;cursor:pointer;
  min-width:42px;flex-shrink:0;transition:all .15s;
}
.day-pill.active{background:var(--accent);color:white;}
.day-pill .dabbr{font-size:10px;font-weight:500;color:var(--text3);margin-bottom:2px;}
.day-pill .dnum{font-size:15px;font-weight:600;color:var(--text2);}
.day-pill.active .dabbr,.day-pill.active .dnum{color:white;}

/* SUMMARY CARD */
.summary-card{
  margin:14px 18px 0;
  background:var(--card);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:0 2px 12px rgba(0,0,0,.05);
}
.sum-day{
  font-family:var(--font-display);
  font-size:20px;
  color:var(--text);
  text-align:center;
  margin-bottom:14px;
}
.cats-row{display:flex;gap:10px;margin-bottom:10px;}
.cats-row.row2{justify-content:center;}
.cats-row.row2 .cat-block{flex:0 0 calc(33.33% - 7px);}
.cat-block{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.cat-label{display:flex;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--text2);white-space:nowrap;}
.cat-label span.icon{font-size:12px;}
.boxes{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}
.box{width:12px;height:12px;border-radius:3px;border:2px solid;position:relative;overflow:hidden;flex-shrink:0;}
.box.half::after{content:'';position:absolute;left:0;top:0;width:50%;height:100%;background:currentColor;}
.box.carry{opacity:.3;}
.box.over::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,currentColor 0,currentColor 2px,transparent 2px,transparent 5px);}

/* ECARTS BAR */
.ecarts-bar{
  border-top:1px solid var(--border);
  padding-top:10px;margin-top:6px;
}
.ecarts-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px;}
.ecarts-info .label{font-weight:600;color:var(--text2);}
.ecarts-info .val{color:var(--text3);}
.ecarts-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.ecarts-fill{height:100%;border-radius:3px;transition:width .3s;}

/* MEALS */
.meals-list{padding:12px 18px 8px;}
.meal-card{
  background:var(--card);
  border-radius:var(--radius);
  margin-bottom:10px;
  box-shadow:0 1px 6px rgba(0,0,0,.04);
  overflow:hidden;
}
.meal-card.coll{background:rgba(255,255,255,.65);backdrop-filter:blur(8px);}
.meal-card.ec-card{border:1.5px solid #fdd5d5;}
.meal-top{
  padding:14px 16px 0;
  display:flex;justify-content:space-between;align-items:flex-start;
  cursor:pointer;
}
.meal-left{flex:1;}
.meal-name{font-size:15px;font-weight:600;color:var(--text);}
.meal-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.meal-emoji{font-size:42px;line-height:1;flex-shrink:0;margin-left:8px;margin-top:-4px;}
.meal-divider{height:1px;background:var(--border);margin:10px 16px 0;}
.meal-open-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 12px;cursor:pointer;
}
.add-btn{
  background:rgba(123,184,154,.15);
  border:none;border-radius:10px;
  padding:8px 16px;
  font-family:var(--font);font-size:13px;font-weight:600;
  color:var(--green);cursor:pointer;
}
.add-btn.red{background:rgba(217,112,112,.1);color:var(--red);}

/* ENTRIES */
.entries{padding:0 16px 4px;}
.entry{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;}
.entry:last-child{border-bottom:none;}
.entry-l{display:flex;align-items:center;gap:7px;flex:1;min-width:0;}
.edot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.rdot{width:9px;height:9px;border-radius:2px;background:var(--purple);flex-shrink:0;}
.entry-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
.entry-r{display:flex;align-items:center;gap:4px;flex-shrink:0;font-size:11px;}
.entry-cases{color:var(--text2);}
.entry-qty{color:var(--text3);}
.edit-btn{background:none;border:.5px solid var(--border);color:var(--text3);cursor:pointer;font-size:10px;padding:2px 6px;border-radius:5px;font-family:var(--font);}
.del-btn{background:none;border:none;color:#ffbbbb;cursor:pointer;font-size:13px;padding:1px 3px;}
.del-btn:hover{color:var(--red);}

/* REC ENTRY */
.rec-entry{padding:6px 0;border-bottom:1px solid var(--border);}
.rec-entry:last-child{border-bottom:none;}
.rec-entry-top{display:flex;align-items:center;justify-content:space-between;}
.rec-entry-l{display:flex;align-items:center;gap:7px;flex:1;min-width:0;}
.rec-entry-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rec-parts{font-size:11px;color:var(--purple);background:rgba(155,114,184,.1);padding:1px 6px;border-radius:6px;flex-shrink:0;margin-left:4px;}
.rec-bilan-line{font-size:11px;color:var(--purple);margin-top:2px;padding-left:16px;}

/* EDIT ROW */
.edit-row{display:flex;gap:6px;align-items:center;padding:4px 16px 6px;border-bottom:1px solid var(--border);}
.edit-row input{flex:1;font-size:13px;padding:5px 8px;border-radius:8px;border:1px solid var(--accent2);background:#f6fdf9;font-family:var(--font);}
.edit-row .ulab{font-size:11px;color:var(--text3);}
.edit-row button{padding:5px 10px;font-size:12px;border-radius:8px;border:1px solid var(--accent2);background:rgba(123,184,154,.15);color:var(--green);cursor:pointer;font-family:var(--font);}

/* ADD FORM */
.add-form{padding:8px 16px 12px;border-top:1px solid var(--border);}
.fld{
  width:100%;font-size:14px;padding:9px 13px;
  border-radius:12px;border:1.5px solid var(--border);
  background:#fafafa;color:var(--text);
  font-family:var(--font);outline:none;
  transition:border-color .15s;
}
.fld:focus{border-color:var(--accent);}
.qty-wrap{display:flex;gap:8px;align-items:center;margin-top:8px;}
.qty-wrap input{flex:1;font-size:14px;padding:9px 12px;border-radius:12px;border:1.5px solid var(--border);background:#fafafa;font-family:var(--font);outline:none;}
.qty-wrap input:focus{border-color:var(--accent);}
.ulab{font-size:12px;color:var(--text3);white-space:nowrap;}
.sub-btn{padding:9px 16px;font-size:13px;border-radius:12px;border:1.5px solid var(--accent2);background:rgba(123,184,154,.12);color:var(--green);cursor:pointer;font-family:var(--font);font-weight:600;white-space:nowrap;}
.hint-txt{font-size:11px;color:var(--text3);margin-top:4px;}

/* SELECTED FOOD */
.sfbar{display:flex;align-items:center;justify-content:space-between;background:rgba(123,184,154,.1);border-radius:10px;padding:7px 12px;margin-top:6px;}
.sfname{font-size:13px;color:var(--green);font-weight:600;}
.sfclear{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;}

/* VEG BOX */
.vegbox{display:flex;align-items:center;justify-content:space-between;background:rgba(123,184,154,.1);border-radius:12px;padding:9px 13px;margin-top:6px;}
.vegadd{padding:6px 13px;font-size:13px;border-radius:9px;border:1.5px solid var(--accent2);background:rgba(123,184,154,.15);color:var(--green);cursor:pointer;font-family:var(--font);font-weight:600;}

/* REC BOX (confirmation) */
.recbox{background:rgba(155,114,184,.08);border-radius:12px;padding:10px 13px;margin-top:6px;border:1.5px solid rgba(155,114,184,.2);}
.recbox-name{font-size:13px;color:var(--purple);font-weight:600;margin-bottom:2px;}
.recbox-bilan{font-size:11px;color:var(--purple);opacity:.8;margin-bottom:8px;}
.recbox-row{display:flex;align-items:center;justify-content:space-between;}
.parts-ctrl{display:flex;align-items:center;gap:8px;}
.pb{background:white;border:1.5px solid rgba(155,114,184,.3);border-radius:8px;padding:4px 10px;font-size:14px;color:var(--purple);cursor:pointer;}
.pval{font-size:14px;font-weight:600;color:var(--purple);min-width:18px;text-align:center;}
.plab{font-size:12px;color:var(--purple);}
.recadd-btn{padding:8px 16px;background:var(--purple);border:none;border-radius:10px;font-size:13px;font-weight:600;color:white;cursor:pointer;font-family:var(--font);}

/* ECART MODE TABS */
.etabs{display:flex;gap:6px;margin-bottom:8px;}
.etab{flex:1;padding:6px;font-size:12px;border-radius:10px;border:1.5px solid var(--border);background:#fafafa;color:var(--text3);cursor:pointer;text-align:center;font-family:var(--font);}
.etab.on{background:rgba(217,112,112,.1);color:var(--red);border-color:rgba(217,112,112,.3);}

/* ── DROPDOWN ── */
.acdrop{
  position:fixed;background:var(--card);
  border-radius:14px;
  border:1px solid var(--border);
  box-shadow:0 8px 32px rgba(0,0,0,.12);
  z-index:9999;max-height:230px;overflow-y:auto;display:none;
}
.acrow{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);}
.acrow:last-child{border-bottom:none;}
.acrow:active{background:var(--bg);}
.actag{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500;}
.artag{font-size:10px;padding:2px 7px;border-radius:6px;background:rgba(155,114,184,.12);color:var(--purple);font-weight:500;}

/* ── RÉFÉRENCE ── */
.page-header{
  padding:24px 18px 6px;
  font-family:var(--font-display);
  font-size:26px;color:var(--text);
}
.ref-search{
  width:calc(100% - 36px);margin:0 18px 12px;
  font-size:14px;padding:10px 14px;
  border-radius:14px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text);
  font-family:var(--font);outline:none;display:block;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.ref-search:focus{border-color:var(--accent);}
#refres,#refcats{padding:0 18px;}
.ref-result{background:var(--card);border-radius:14px;padding:10px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.catsec{background:var(--card);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.catheader{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;}
.cathl{display:flex;align-items:center;gap:8px;}
.cchev{font-size:12px;color:var(--text3);transition:transform .2s;}
.cchev.open{transform:rotate(180deg);}
.catitems{display:none;border-top:1px solid var(--border);}
.catitems.open{display:block;}
.catitem{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.catitem:last-child{border-bottom:none;}
.ciqty{color:var(--green);font-weight:600;font-size:12px;}

/* ── RECETTES ── */
.rec-page-inner{padding:0 18px 10px;}
.recgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.rectile{
  background:var(--card);border-radius:var(--radius);
  padding:18px 12px;display:flex;flex-direction:column;
  align-items:center;gap:8px;cursor:pointer;
  border:2px solid transparent;
  box-shadow:0 1px 6px rgba(0,0,0,.05);
  transition:border-color .15s;
}
.rectile:active{border-color:var(--accent);}
.rtemoji{font-size:38px;}
.rtlabel{font-size:14px;font-weight:600;color:var(--text);}
.rtcount{font-size:11px;color:var(--text3);}
.recaddbtn{
  width:100%;padding:13px;
  background:rgba(123,184,154,.15);border:none;
  border-radius:14px;font-size:14px;font-weight:600;
  color:var(--green);cursor:pointer;margin-bottom:12px;
  font-family:var(--font);
}
.rlisthdr{display:flex;align-items:center;gap:10px;padding:8px 0 12px;}
.rback{background:none;border:none;font-size:20px;color:var(--text2);cursor:pointer;}
.rlisttitle{font-family:var(--font-display);font-size:22px;color:var(--text);}
.rcard{background:var(--card);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.rchdr{padding:13px 15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.rcname{font-size:14px;font-weight:600;color:var(--text);}
.rcbilan{font-size:11px;color:var(--text3);margin-top:2px;}
.rcbody{display:none;border-top:1px solid var(--border);padding:12px 15px;}
.rcbody.open{display:block;}
.rst{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:8px 0 3px;}
.rst:first-child{margin-top:0;}
.ring{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.rprep{font-size:12px;color:var(--text3);line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.rdelbtn{padding:7px 13px;background:none;border:1.5px solid #fdd5d5;border-radius:9px;font-size:12px;color:var(--red);cursor:pointer;margin-top:10px;font-family:var(--font);}

/* ── BOTTOM NAV ── */
.bnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  display:flex;z-index:200;
  padding-bottom:var(--safe-bottom);
}
.ntab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 0 11px;cursor:pointer;
  font-size:10px;font-weight:600;color:var(--text3);gap:3px;
  transition:color .15s;
}
.ntab.active{color:var(--accent);}
.nicon{font-size:21px;}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;align-items:flex-end;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{
  background:var(--card);border-radius:22px 22px 0 0;
  padding:20px 18px calc(24px + var(--safe-bottom));
  width:100%;max-width:430px;max-height:88vh;overflow-y:auto;
}
.modal::-webkit-scrollbar{display:none;}
.mtitle{font-family:var(--font-display);font-size:20px;color:var(--text);margin-bottom:16px;}
.mlabel{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:4px;margin-top:12px;text-transform:uppercase;letter-spacing:.04em;}
.minput{width:100%;font-size:14px;padding:10px 13px;border-radius:12px;border:1.5px solid var(--border);background:#fafafa;color:var(--text);font-family:var(--font);outline:none;}
.minput:focus{border-color:var(--accent);}
.mtxt{width:100%;font-size:13px;padding:10px 13px;border-radius:12px;border:1.5px solid var(--border);background:#fafafa;color:var(--text);font-family:var(--font);min-height:70px;resize:vertical;outline:none;}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.bgrid .mlabel{margin-top:0;}
.mactions{display:flex;gap:10px;margin-top:18px;}
.msave{flex:1;padding:12px;background:var(--accent);border:none;border-radius:12px;font-size:14px;font-weight:700;color:white;cursor:pointer;font-family:var(--font);}
.mcancel{padding:12px 18px;background:var(--border);border:none;border-radius:12px;font-size:14px;color:var(--text2);cursor:pointer;font-family:var(--font);}

/* SPLASH */
.splash{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .4s;
}
.splash-logo{font-family:var(--font-display);font-size:48px;color:var(--accent);font-style:italic;}
.splash-sub{font-size:14px;color:var(--text3);margin-top:6px;font-weight:300;}

@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1612;--card:#252018;--border:#35302a;
    --text:#f0e8e0;--text2:#c0a898;--text3:#7a6a60;
  }
  .fld,.qty-wrap input,.minput,.mtxt{background:#1e1a16;color:var(--text);}
  .ref-search{background:var(--card);}
}

.export-btn{
  display:flex;align-items:center;gap:6px;
  background:var(--card);border:1.5px solid var(--border);
  border-radius:12px;padding:8px 14px;
  font-family:var(--font);font-size:13px;font-weight:600;
  color:var(--accent2);cursor:pointer;
  margin:10px 18px 0;width:calc(100% - 36px);
  justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.export-btn:active{opacity:.7;}

</style>
</head>
<body>

<!-- Splash -->
<div class="splash" id="splash">
  <div class="splash-logo">Gladder</div>
  <div class="splash-sub">Suivi nutritionnel</div>
</div>

<!-- Dropdown global -->
<div class="acdrop" id="gac"></div>

<div class="app">
  <div class="scroll-area" id="scroll-area">

    <!-- ── PAGE JOURNAL ── -->
    <div class="page active" id="page-journal">
      <div class="journal-header">
        <div class="week-nav">
          <button class="week-arrow" onclick="shiftW(-1)">&#8592;</button>
          <div class="week-scroll" id="wscroll"></div>
          <button class="week-arrow" onclick="shiftW(1)">&#8594;</button>
        </div>
      </div>
        <button class="export-btn" onclick="exporterSemainier()">
        📊 Exporter le semainier (.xlsx)
      </button>
    <div style="padding:0 18px">
        <div class="summary-card">
          <div class="sum-day" id="sumday">Aujourd'hui</div>
          <div id="catsbox"></div>
          <div class="ecarts-bar" id="ecartsbar"></div>
        </div>
      </div>
      <div class="meals-list" id="mealslist"></div>
    </div>

    <!-- ── PAGE RÉFÉRENCE ── -->
    <div class="page" id="page-ref">
      <div class="page-header">Référence</div>
      <input class="ref-search" type="text" placeholder="Rechercher un aliment…" oninput="onRefS(this.value)" id="refinput"/>
      <div id="refres"></div>
      <div id="refcats"></div>
    </div>

    <!-- ── PAGE RECETTES ── -->
    <div class="page" id="page-rec">
      <div style="padding:0 18px 10px">
        <div id="rechome">
          <div class="page-header" style="padding-left:0">Recettes</div>

var RCAT=[{key:'plats',label:'Plats',e:'🍲'},{key:'sauces',label:'Sauces',e:'🥣'},{key:'desserts',label:'Desserts',e:'🍮'},{key:'mes',label:'Mes recettes',e:'📒'}];

// ═══════════════════════════════════════
// PERSISTANCE localStorage
// ═══════════════════════════════════════
var SAVE_KEY = 'gladder_v1';

function saveData() {
  try {
    var data = {
      daymap: daymap,
      recipes_custom: recipes.filter(function(r){ return r.id >= 300; }),
      saved_at: Date.now()
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e) { /* quota exceeded, ignore */ }
}

function loadData() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    // Restore daymap
    if (data.daymap) {
      var keys = Object.keys(data.daymap);
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        var d = data.daymap[k];
        // Restore meals with all fields
        if (d.meals) {
          for (var mi = 0; mi < d.meals.length; mi++) {
            var meal = d.meals[mi];
            // Ensure transient UI fields are reset
            meal.open = false;
            meal.sf = null;
            meal.sr = null;
            meal.sv = '';
          }
        }
        daymap[k] = d;
      }
    }
    // Restore custom recipes
    if (data.recipes_custom && data.recipes_custom.length > 0) {
      for (var ri = 0; ri < data.recipes_custom.length; ri++) {
        recipes.push(data.recipes_custom[ri]);
        if (data.recipes_custom[ri].id >= newRecId) {
          newRecId = data.recipes_custom[ri].id + 1;
        }
      }
    }
  } catch(e) { /* corrupted data, ignore */ }
}

function saAll(q){
  var nq=nrm(q);
  var fs=FOODS.filter(function(f){return nrm(f.name).startsWith(nq);})
    .concat(FOODS.filter(function(f){return nrm(f.name).includes(nq)&&!nrm(f.name).startsWith(nq);}))
    .slice(0,7).map(function(f){return{name:f.name,cat:f.cat,unit:f.unit,per:f.per,_t:'food'};});
  var rs=recipes.filter(function(r){return nrm(r.name).startsWith(nq);})
    .concat(recipes.filter(function(r){return nrm(r.name).includes(nq)&&!nrm(r.name).startsWith(nq);}))
    .slice(0,4).map(function(r){return{id:r.id,name:r.name,cat:r.cat,bilan:r.bilan,note:r.note,_t:'rec'};});
  return fs.concat(rs).slice(0,12);
}

var TODAY=new Date();TODAY.setHours(0,0,0,0);
function dk(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+day;}
function dfk(k){var p=k.split('-').map(Number);var r=new Date(p[0],p[1]-1,p[2]);r.setHours(0,0,0,0);return r;}
function addD(d,n){var r=new Date(d);r.setDate(r.getDate()+n);r.setHours(0,0,0,0);return r;}
function getMon(d){var r=new Date(d);r.setHours(0,0,0,0);var day=r.getDay();r.setDate(r.getDate()+(day===0?-6:1-day));return r;}
function wk(d){return dk(getMon(d));}
function isPast(d){return dk(d)<dk(TODAY);}
function fc(c){var r=Math.round(c*10)/10;return r+' case'+(r!==1?'s':'');}
function bsS(b){var p=Object.keys(b||{}).filter(function(k){return b[k]>0;}).map(function(k){return b[k]+k;});return p.length?p.join(' '):'-';}
function bsL(b){var p=Object.keys(b||{}).filter(function(k){return b[k]>0;}).map(function(k){return b[k]+' case'+(b[k]>1?'s':'')+' '+CL[k];});return p.length?p.join(', '):'Aucune case';}

var cur=new Date(TODAY),wOff=0,daymap={},idc=0,editId=null;
var gac=document.getElementById('gac'),gacM=[],gacMi=null,eacM=[];

function getDay(d){
  var k=dk(d);
  if(!daymap[k]){daymap[k]={meals:MDEF.map(function(m){return{name:m.name,sub:m.sub,coll:m.coll,il:m.il,entries:[],open:false,sf:null,sr:null,sv:''};}),con:{P:0,L:0,G:0,F:0,S:0},ec:[],eco:false,ecm:'libre',ecf:null};}
  return daymap[k];
}
function getQuota(d){
  var q={P:BQ.P,L:BQ.L,G:BQ.G,F:BQ.F,S:BQ.S},tk=dk(d);
  var keys=Object.keys(daymap).sort().filter(function(k){return k<tk&&isPast(dfk(k));});
  for(var ci=0;ci<CARRY.length;ci++){var cat=CARRY[ci],carry=0;for(var ki=0;ki<keys.length;ki++)carry=Math.max(0,BQ[cat]+carry-(daymap[keys[ki]].con[cat]||0));q[cat]=BQ[cat]+carry;}
  return q;
}
function getWEB(d){
  var wk2=wk(d),wks=[],seen={};
  Object.keys(daymap).forEach(function(k){var w=dk(getMon(dfk(k)));if(!seen[w]){seen[w]=true;wks.push(w);}});
  wks.sort();var carry=0;
  for(var i=0;i<wks.length;i++){var w=wks[i];if(w>=wk2)break;var wm=dfk(w);if(!isPast(addD(wm,6)))break;carry=Math.max(0,EB+carry-getWEU(w));}
  return EB+carry;
}
function getWEU(wm){var t=0;for(var i=0;i<7;i++){var k=dk(addD(dfk(wm),i));if(daymap[k])t+=daymap[k].ec.reduce(function(s,e){return s+e.kcal;},0);}return Math.round(t);}

function posDrop(el){
  var r=el.getBoundingClientRect();
  var mh=Math.min(230,window.innerHeight-r.bottom-8);
  gac.style.width=r.width+'px';
  gac.style.left=r.left+'px';
  gac.style.top=(r.bottom+4)+'px';
  gac.style.bottom='auto';
  gac.style.maxHeight=Math.max(80,mh)+'px';
}
function showDrop(mi,m,el){
  gacMi=mi;gacM=m;
  gac.innerHTML=m.map(function(x,i){
    if(x._t==='rec'){var bs=bsS(x.bilan);return'<div class="acrow" onmousedown="pickI('+i+')"><span>🍳 '+x.name+'</span><span class="artag">'+bs+'/part</span></div>';}
    return'<div class="acrow" onmousedown="pickI('+i+')"><span>'+x.name+'</span><span class="actag" style="background:'+CV[x.cat]+'18;color:'+CV[x.cat]+';">'+CL[x.cat]+'</span></div>';
  }).join('');
  posDrop(el);gac.style.display='block';
}
function hideDrop(){gac.style.display='none';gacMi=null;}
function pickI(i){
  var x=gacM[i];if(!x||gacMi===null)return;
  var meal=getDay(cur).meals[gacMi];
  if(x._t==='rec'){meal.sr={recipe:x,parts:1};meal.sf=null;meal.sv='';}
  else{meal.sf=x;meal.sr=null;meal.sv='';}
  hideDrop();render();
  if(x._t==='food'&&x.cat!=='V')setTimeout(function(){var q=document.getElementById('q-'+gacMi);if(q)q.focus();},40);
}

function renderWeek(){
  var bm=getMon(cur),dm=addD(bm,wOff*7),dn=['lun.','mar.','mer.','jeu.','ven.','sam.','dim.'],html='';
  for(var i=0;i<7;i++){var d=addD(dm,i),act=dk(d)===dk(cur);html+='<div class="day-pill'+(act?' active':'')+'" onclick="selDay(\''+dk(d)+'\')"><span class="dabbr">'+dn[i]+'</span><span class="dnum">'+d.getDate()+'</span></div>';}
  document.getElementById('wscroll').innerHTML=html;
  document.getElementById('sumday').textContent=dk(cur)===dk(TODAY)?"Aujourd'hui":['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'][cur.getDay()]+' '+cur.getDate();
}
function shiftW(dir){
  wOff+=dir;var bm=getMon(TODAY),dm=addD(bm,wOff*7),ds=addD(dm,6);
  if(dk(cur)<dk(dm)||dk(cur)>dk(ds))cur=new Date(dm);
  loadData();getDay(cur);render();saveData();
}

function catBlock(cat,day,q){
  var m=CMETA[cat],used=day.con[cat]||0,max=q[cat],base=BQ[cat],total=Math.ceil(Math.max(used,max));
  var boxes='';
  for(var i=0;i<total;i++){
    if(i+1>max){boxes+='<div class="box over" style="border-color:'+m.border+';color:'+m.color+';border-width:2px;"></div>';}
    else{var ic=i+1>base,st=used>=i+1?'filled':used>=i+0.5?'half':'empty';boxes+='<div class="box '+st+(ic?' carry':'')+'" style="border-color:'+m.border+';color:'+m.color+';'+(st==='filled'?'background:'+m.color:'')+'"></div>';}
  }
  return '<div class="cat-block"><div class="cat-label"><span class="icon">'+m.icon+'</span>'+m.label+'</div><div class="boxes">'+boxes+'</div></div>';
}
function renderSummary(){
  var day=getDay(cur),q=getQuota(cur);
  document.getElementById('catsbox').innerHTML=
    '<div class="cats-row">'+catBlock('P',day,q)+catBlock('L',day,q)+'</div>'+
    '<div class="cats-row row2">'+catBlock('G',day,q)+catBlock('F',day,q)+catBlock('S',day,q)+'</div>';
  var budget=getWEB(cur),used=getWEU(wk(cur)),over=Math.max(0,used-budget),pct=Math.min(100,Math.round(Math.min(used,budget)/budget*100)),carry=budget-EB;
  var cTxt=carry>0?' <span style="font-size:10px;opacity:.6">(+'+carry+' rep.)</span>':'';
  var oTxt=over>0?' <span style="color:#d97070;font-size:11px;">+'+over+' kcal dépassés</span>':'';
  document.getElementById('ecartsbar').innerHTML=
    '<div class="ecarts-info"><span class="label">Écarts semaine'+cTxt+'</span><span class="val">'+used+' / '+budget+' kcal'+oTxt+'</span></div>'+
    '<div class="ecarts-track"><div class="ecarts-fill" style="width:'+pct+'%;background:'+(over>0?'#d97070':'#c8874a')+'"></div></div>';
}

function renderMeals(){
  var day=getDay(cur),html='';
  for(var mi=0;mi<day.meals.length;mi++){
    var meal=day.meals[mi],ehtml='';
    for(var ei=0;ei<meal.entries.length;ei++){
      var e=meal.entries[ei];
      if(editId===e.id&&e._t!=='rec'){
        ehtml+='<div class="edit-row"><div class="edot" style="background:'+CV[e.cat]+';"></div><span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+e.name+'</span><input type="number" id="eq-'+e.id+'" value="'+e.qty+'" min="0" step="any" style="width:60px;flex:0 0 60px;" onkeydown="if(event.key===\'Enter\')confEdit('+mi+','+e.id+')"/><span class="ulab">'+e.unit+'</span><button onclick="confEdit('+mi+','+e.id+')">OK</button><button class="del-btn" onclick="cancelEdit()">✕</button></div>';
        continue;
      }
      if(e._t==='rec'){
        var pl=e.parts+' part'+(e.parts>1?'s':'');
        ehtml+='<div class="rec-entry"><div class="rec-entry-top"><div class="rec-entry-l"><div class="rdot"></div><span class="rec-entry-name">'+e.name+'</span><span class="rec-parts">'+pl+'</span></div><button class="del-btn" onclick="delE('+mi+','+e.id+')">✕</button></div><div class="rec-bilan-line">'+bsL(e.bilanTotal)+'</div></div>';
        continue;
      }
      ehtml+='<div class="entry"><div class="entry-l"><div class="edot" style="background:'+CV[e.cat]+';"></div><span class="entry-name">'+e.name+'</span></div><div class="entry-r">'+
        (e.cat==='V'?'<span style="color:#7bb89a;font-size:11px;">à volonté</span>':'<span class="entry-cases">'+fc(e.cases)+'</span><span class="entry-qty">'+e.qty+' '+e.unit+'</span>')+
        (e.cat!=='V'?'<button class="edit-btn" onclick="startEdit('+e.id+')">✏</button>':'')+
        '<button class="del-btn" onclick="delE('+mi+','+e.id+')">✕</button></div></div>';
    }
    var sf=meal.sf,sr=meal.sr,fs='';
    if(meal.open){

function setEcm(m){var day=getDay(cur);day.ecm=m;day.ecf=null;render();}
function onF(mi,inp){var meal=getDay(cur).meals[mi];if(meal.sf||meal.sr)return;var sv=meal.sv||'';if(sv.length>=2){var m=saAll(sv);if(m.length)showDrop(mi,m,inp);}}

function chgP(mi,d){var meal=getDay(cur).meals[mi];if(!meal.sr)return;meal.sr.parts=Math.max(1,meal.sr.parts+d);render();}
function addRecE(mi){
  var day=getDay(cur),meal=day.meals[mi],sr=meal.sr;if(!sr)return;
  var r=sr.recipe,pts=sr.parts,bilanTotal={},keys=Object.keys(r.bilan||{});
  for(var i=0;i<keys.length;i++){var k=keys[i],val=Math.round(r.bilan[k]*pts*100)/100;if(val>0){bilanTotal[k]=val;if(day.con[k]!==undefined)day.con[k]=Math.round((day.con[k]+val)*1000)/1000;}}
  meal.entries.push({id:idc++,_t:'rec',name:r.name,parts:pts,bilan:r.bilan,bilanTotal:bilanTotal,cases:0,cat:'recipe'});
  meal.sr=null;meal.sf=null;meal.open=false;hideDrop();render();saveData();saveData();
}
function addVeg(mi){var day=getDay(cur),meal=day.meals[mi],sf=meal.sf;if(!sf)return;meal.entries.push({id:idc++,name:sf.name,cat:'V',unit:'',qty:0,cases:0});meal.sf=null;meal.open=false;hideDrop();render();}
function addE(mi){
  var day=getDay(cur),meal=day.meals[mi],sf=meal.sf;if(!sf)return;
  if(sf.cat==='V'){addVeg(mi);return;}
  var qty=parseFloat(document.getElementById('q-'+mi).value);if(!qty||qty<=0)return;
  var cases=qty/sf.per;
  meal.entries.push({id:idc++,name:sf.name,cat:sf.cat,unit:sf.unit,qty:qty,cases:cases,per:sf.per});
  day.con[sf.cat]=Math.round((day.con[sf.cat]+cases)*1000)/1000;
  meal.sf=null;meal.open=false;hideDrop();render();saveData();
}
function startEdit(id){editId=id;render();}
function cancelEdit(){editId=null;render();}
function confEdit(mi,id){
  var inp=document.getElementById('eq-'+id);if(!inp)return;
  var qty=parseFloat(inp.value);if(!qty||qty<=0){editId=null;render();return;}
  var day=getDay(cur),e=null;
  for(var i=0;i<day.meals[mi].entries.length;i++){if(day.meals[mi].entries[i].id===id){e=day.meals[mi].entries[i];break;}}
  if(!e){editId=null;return;}
  if(e.cat!=='V'&&e._t!=='rec'){day.con[e.cat]=Math.round((day.con[e.cat]-e.cases)*1000)/1000;e.cases=qty/(e.per||1);e.qty=qty;day.con[e.cat]=Math.round((day.con[e.cat]+e.cases)*1000)/1000;}
  editId=null;render();saveData();
}
function delE(mi,id){
  var day=getDay(cur),meal=day.meals[mi],e=null;
  for(var i=0;i<meal.entries.length;i++){if(meal.entries[i].id===id){e=meal.entries[i];break;}}
  if(!e)return;
  if(e._t==='rec'){var bkeys=Object.keys(e.bilanTotal||{});for(var i=0;i<bkeys.length;i++){var k=bkeys[i];if(day.con[k]!==undefined)day.con[k]=Math.round((day.con[k]-e.bilanTotal[k])*1000)/1000;}}
  else if(e.cat!=='V'){day.con[e.cat]=Math.round((day.con[e.cat]-e.cases)*1000)/1000;}
  meal.entries=meal.entries.filter(function(x){return x.id!==id;});if(editId===id)editId=null;render();saveData();
}

function addEcL(){var day=getDay(cur);var kcal=parseFloat(document.getElementById('ekcal').value);if(!kcal||kcal<=0)return;var lab=document.getElementById('elab').value.trim()||'Écart';day.ec.push({id:idc++,name:lab,kcal:kcal});day.eco=false;render();saveData();}

function exporterSemainier() {

    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';

}

  var JOURS_FR = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

  var CATS_LBLS   = ['Protéines','Laitages','Matières grasses','Légumes','Fruits','Pain/féculents'];
  var CATS_QUOTAS2= {P:6,L:3,G:3,V:null,F:3,S:4};

  // Couleurs par catégorie (ARGB pour xlsx)
  var CAT_BG = {P:'FFdbeafe',L:'FFf3f4f6',G:'FFdcfce7',V:'FFf0fdf4',F:'FFfee2e2',S:'FFfef9c3'};
  var CAT_FG = {P:'FF3b82f6',L:'FF6b7280',G:'FF16a34a',V:'FF15803d',F:'FFdc2626',S:'FFca8a04'};

  var PURPLE_HDR = 'FFc084a8';
  var GREY_HDR   = 'FFd9d9d9';

  function makeBoxes(used, quota) {
    if (quota === null) return 'à volonté';
    var s = '';
    for (var i = 0; i < quota; i++) {
      s += (i < used) ? '■' : '□';
      if (i < quota - 1) s += ' ';
    }
    s += '  ' + used + '/' + quota;
    return s;
  }

  function joinItems(items) {
    return items && items.length ? items.join(' + ') : '';
  }

  // Déterminer la semaine courante
  var bm = getMon(cur);
  var ds = addD(bm, 6);
  function fmtDate(d) {
    return d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
  }
  var weekLabel = 'du ' + fmtDate(bm) + ' au ' + fmtDate(ds);

  var wb = XLSX.utils.book_new();
  var wsData = [];

  // Style helpers
  function hdrStyle(bg) {
    return {font:{bold:true,color:{rgb:'FFFFFFFF'}}, fill:{patternType:'solid',fgColor:{rgb:bg}}, alignment:{horizontal:'center',vertical:'center'}};
  }
  function catStyle(bgRgb, fgRgb) {
    return {font:{bold:true,color:{rgb:fgRgb}}, fill:{patternType:'solid',fgColor:{rgb:bgRgb}}, alignment:{horizontal:'left',vertical:'center'}};
  }
  function boxStyle(bgRgb, fgRgb) {
    return {font:{bold:true,color:{rgb:fgRgb}}, fill:{patternType:'solid',fgColor:{rgb:bgRgb}}, alignment:{horizontal:'center',vertical:'center',wrapText:true}};
  }
  function cellStyle(bgRgb) {
    return {font:{color:{rgb:'FF1a1410'}}, fill:{patternType:'solid',fgColor:{rgb:bgRgb}}, alignment:{horizontal:'center',vertical:'center',wrapText:true}};
  }
  function whiteCellStyle() {
    return {font:{color:{rgb:'FF1a1410'}}, alignment:{horizontal:'center',vertical:'center',wrapText:true}};
  }
  function ecartStyle() {
    return {font:{bold:true,color:{rgb:'FFc0392b'}}, fill:{patternType:'solid',fgColor:{rgb:'FFffe8e8'}}, alignment:{horizontal:'center',vertical:'center'}};
  }

  var ws = {};
  var rowNum = 1; // 1-indexed

  // ── TITRE ──
  var titleCell = XLSX.utils.encode_cell({r:0, c:0});
  ws[titleCell] = {
    v: 'Gladder — Semainier ' + weekLabel,
    s: {font:{bold:true,size:12,color:{rgb:'FF7c3aed'}}, fill:{patternType:'solid',fgColor:{rgb:'FFf5f0f8'}}, alignment:{horizontal:'left',vertical:'center'}}
  };
  // Merge A1:H1
  ws['!merges'] = [{s:{r:0,c:0}, e:{r:0,c:7}}];
  rowNum = 2;

  for (var ji = 0; ji < JOURS_FR.length; ji++) {
    var jour = JOURS_FR[ji];
    var hdrRow = rowNum - 1; // 0-indexed pour SheetJS

    // Chercher les données du jour dans daymap
    // On cherche la date de ce jour dans la semaine courante
    var jourDate = addD(bm, ji);
    var jourKey = dk(jourDate);
    var dayData = daymap[jourKey] || {meals:[], con:{P:0,L:0,G:0,F:0,S:0}, ec:[]};
    var con = dayData.con || {};

    // Reconstruire les données par repas × catégorie depuis les entries
    var repasData = {};
    REPAS_KEYS2.forEach(function(rk) { repasData[rk] = {P:[],L:[],G:[],V:[],F:[],S:[]}; });

    // Les meals de Gladder : pdej=0, coll_matin=1, dejeuner=2, coll_apm=3, diner=4, coll_soir=5
    if (dayData.meals) {
      var mealIdxMap = {pdej:0, coll_matin:1, dejeuner:2, coll_apm:3, diner:4, coll_soir:5};
      Object.keys(mealIdxMap).forEach(function(rk) {
        var mi = mealIdxMap[rk];
        var meal = dayData.meals[mi];
        if (!meal || !meal.entries) return;
        meal.entries.forEach(function(e) {
          if (e._t === 'rec') {
            // Recette : ajouter le nom dans chaque catégorie du bilan
            var bilan = e.bilanTotal || e.bilan || {};
            Object.keys(bilan).forEach(function(catK) {
              if (bilan[catK] > 0 && repasData[rk][catK] !== undefined) {
                repasData[rk][catK].push(e.parts + ' part' + (e.parts > 1 ? 's' : '') + ' ' + e.name);
              }
            });
          } else if (e.cat && e.cat !== 'recipe') {
            // Aliment normal
            if (repasData[rk][e.cat] !== undefined) {
              var txt = e.cat === 'V' ? e.name : e.qty + ' ' + e.unit + ' ' + e.name;
              repasData[rk][e.cat].push(txt);
            }
          }
        });
      });
    }

    // — Header jour —
    var hCols = [jour, '', 'Petit déjeuner', 'Collation', 'Déjeuner', 'Collation', 'Dîner', 'Collation'];
    for (var c = 0; c < hCols.length; c++) {
      var cellRef = XLSX.utils.encode_cell({r: hdrRow, c: c});
      ws[cellRef] = {
        v: hCols[c],
        s: c === 0 ? {font:{bold:true,size:11,color:{rgb:'FFFFFFFF'}}, fill:{patternType:'solid',fgColor:{rgb:PURPLE_HDR}}, alignment:{horizontal:'left',vertical:'center'}}
                   : {font:{bold:true,size:9,color:{rgb:'FFFFFFFF'}}, fill:{patternType:'solid',fgColor:{rgb:PURPLE_HDR}}, alignment:{horizontal:'center',vertical:'center'}}
      };
    }
    ws['!merges'].push({s:{r:hdrRow,c:0}, e:{r:hdrRow,c:1}});
    rowNum++;

    // — Catégories —
    for (var ci = 0; ci < CATS_KEYS2.length; ci++) {
      var catKey = CATS_KEYS2[ci];
      var catLbl = CATS_LBLS[ci];
      var quota  = CATS_QUOTAS2[catKey];
      var used   = (catKey !== 'V') ? (con[catKey] || 0) : 0;
      var bgRgb  = CAT_BG[catKey];
      var fgRgb  = CAT_FG[catKey];
      var catRow = rowNum - 1;

      // A : label
      ws[XLSX.utils.encode_cell({r:catRow,c:0})] = {v: catLbl, s: catStyle(bgRgb, fgRgb)};
      // B : cases visuelles
      ws[XLSX.utils.encode_cell({r:catRow,c:1})] = {v: makeBoxes(used, quota), s: boxStyle(bgRgb, fgRgb)};
      // C-H : contenu repas
      for (var ri = 0; ri < REPAS_KEYS2.length; ri++) {
        var rk = REPAS_KEYS2[ri];
        var items = repasData[rk][catKey] || [];
        var txt = joinItems(items);
        var cr = XLSX.utils.encode_cell({r:catRow, c:2+ri});
        ws[cr] = {v: txt || '', s: txt ? cellStyle(bgRgb) : whiteCellStyle()};
      }
      rowNum++;
    }

    // Ligne vide séparation
    rowNum++;
  }

  // ── ÉCARTS ──
  var ecRow = rowNum - 1;
  var totalEc = 0;
  for (var ji2 = 0; ji2 < JOURS_FR.length; ji2++) {
    var jourDate2 = addD(bm, ji2);
    var d2 = daymap[dk(jourDate2)];
    if (d2) totalEc += d2.ec.reduce(function(s,e){return s+e.kcal;},0);
  }
  ws[XLSX.utils.encode_cell({r:ecRow,c:0})] = {v:'Écarts :', s: ecartStyle()};
  ws[XLSX.utils.encode_cell({r:ecRow,c:1})] = {v: Math.round(totalEc) + ' / 500 kcal', s: ecartStyle()};
  for (var ji3 = 0; ji3 < Math.min(6, JOURS_FR.length); ji3++) {
    var jourDate3 = addD(bm, ji3);
    var d3 = daymap[dk(jourDate3)];
    var ec3 = d3 ? Math.round(d3.ec.reduce(function(s,e){return s+e.kcal;},0)) : 0;
    ws[XLSX.utils.encode_cell({r:ecRow,c:2+ji3})] = {
      v: ec3 > 0 ? JOURS_FR[ji3].slice(0,3)+' : '+ec3+' kcal' : '',
      s: {font:{size:8,color:{rgb:ec3>0?'FFc0392b':'FF999999'}}, fill:{patternType:'solid',fgColor:{rgb:'FFffe8e8'}}, alignment:{horizontal:'center',vertical:'center'}}
    };
  }

  // ── RANGE & DIMENSIONS ──
  ws['!ref'] = XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:ecRow,c:7}});
  ws['!cols'] = [
    {wpx:140}, // A
    {wpx:95},  // B  
    {wpx:125}, // C
    {wpx:70},  // D
    {wpx:130}, // E
    {wpx:80},  // F
    {wpx:125}, // G
    {wpx:80},  // H
  ];

  XLSX.utils.book_append_sheet(wb, ws, 'Semainier');
  var filename = 'Gladder_semainier_' + fmtDate(bm).replace(/\//g,'-') + '.xlsx';
  XLSX.writeFile(wb, filename);
}

</script>
